[build]
builder = "RAILPACK"
# The BM25 index is committed with the application; ingestion is offline-only.
buildCommand = "python -m compileall -q app"

[deploy]
startCommand = "python run_server.py"
healthcheckPath = "/health"
healthcheckTimeout = 100
restartPolicyType = "ON_FAILURE"
restartPolicyMaxRetries = 5
